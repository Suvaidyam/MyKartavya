<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>Corporate Registration Request Not Approved/title>
  <style>
    * {
      box-sizing: border-box;
    }

  
    body { 
 
        font-family: 'Arial', sans-serif; 
 
        background-color: #f4f4f4; 
 
        margin: 0; 
 
        padding: 0; 
 
    } 
 
    .email-container { 
 
        max-width: 600px; 
 
        margin: 30px auto; 
 
        background-color: #ffffff; 
 
        padding: 20px; 
 
        border-radius: 8px; 
 
        box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
 
    } 
 
    .header { 
 
        text-align: center; 
 
    } 
 
    .header img { 
 
        max-width: 150px; 
 
    } 
 
    .content { 
 
        text-align: center; 
 
        color: #333333; 
 
    } 
 
    .info-block { 
 
        font-size: 18px; 
 
        font-weight: bold; 
 
        margin: 15px 0; 
 
        color: #555555; 
 
    } 
 
    .footer { 
 
        text-align: center; 
 
        margin-top: 30px; 
 
        font-size: 14px; 
 
        color: #777777; 
 
    } 
 
    .button { 
 
        display: inline-block; 
 
        padding: 10px 20px; 
 
        background-color: #555555; 
 
        color: #ffffff; 
 
        text-decoration: none; 
 
        border-radius: 5px; 
 
        margin-top: 20px; 
 
        font-weight: bold; 
 
    } 
 
    .button:hover { 
 
        background-color: #333333; 
 
    } 
 
    @media (max-width: 600px) { 
 
        .email-container { 
 
            padding: 15px; 
 
        } 
 
    }
     .logo img {
            max-width: 300px;
            height: auto;
        }
  </style>
</head>

<body>
 
 <div class="email-container"> 
 
    <div class="header"> 
 
        <div class="logo">
      <img src="https://res.cloudinary.com/dyt5jqnax/image/upload/v1742533366/mykartavya-logo_jptv31.png"
        alt="MyKartavya Logo" />
    </div> 
 
    </div> 
 
    <div class="content"> 
 
        <h2 style="color: #555555;">Volunteer Registration Successful</h2> 
 
        <p>Hello, <strong>{{doc.first_name}}</strong></p> 
 
        <p>You have been successfully registered as a volunteer.</p> 
 
        <div class="info-block"> 
 
            <p>Email: <a href="mailto:{{doc.email}}" style="color: #555555; text-decoration: none;">{{doc.email}}</a></p> 
 
            <p>Mobile Number: {{ doc.custom_phone_number.replace('+91-', '') }}</p> 
 
        </div> 
 
        <p>You can now log in using your credentials.</p> 
 
    </div> 
 
    <div class="footer"> 
 
        <p>Thank you!<br>Team MyKartavya</p> 
 
        <p>If you did not initiate this registration, please contact us immediately.</p> 
 
    </div> 
 
</div>
</body>

</html>
